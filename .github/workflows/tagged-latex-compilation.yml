# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    tags: ["*"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
      - name: Compile Constitution
        uses: dante-ev/latex-action@2021-A
        with:
          # The root LaTeX file to be compiled
          root_file: Constitution.tex
          # Extra arguments to be passed to the latex compiler
          args: -cd -pdf -latexoption=-file-line-error -latexoption=-interaction=nonstopmode
      - name: Compile SOs
        uses: dante-ev/latex-action@2021-A
        with:
          # The root LaTeX file to be compiled
          root_file: StandingOrders.tex
          # Extra arguments to be passed to the latex compiler
          args: -cd -pdf -latexoption=-file-line-error -latexoption=-interaction=nonstopmode
      # Runs a set of commands using the runners shell
      - name: Upload SOs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: JCR SOs
          path: StandingOrders.pdf
      - name: Upload Constitution
        uses: actions/upload-artifact@v7.0.1
        with:
          name: JCR Constitution
          path: Constitution.pdf
          
      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            StandingOrders.pdf
            Constitution.pdf
          
